name: CI

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: docker build -t ghcr.io/ahmedkhafagy6/flask-app:${{ github.sha }} .

      - name: Push to GHCR
        run: docker push ghcr.io/ahmedkhafagy6/flask-app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy to cluster
        run: |
          sudo k3s kubectl set image deployment/flask-deployment flask=ghcr.io/ahmedkhafagy6/flask-app:${{ github.sha }}
