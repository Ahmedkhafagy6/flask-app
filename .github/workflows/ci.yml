name: CI

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: docker build -t ghcr.io/ahmedkhafagy6/flask-app:latest .

      - name: Push to GHCR
        run: docker push ghcr.io/ahmedkhafagy6/flask-app:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy container
        run: |
          docker stop flask-app
          docker rm flask-app
          docker pull ghcr.io/ahmedkhafagy6/flask-app:latest
          docker run -d -p 5000:5000 --restart always --name flask-app ghcr.io/ahmedkhafagy6/flask-app:latest
