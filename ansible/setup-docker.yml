---
- name: Prepare server with Docker
  hosts: lab
  become: true

  tasks:
    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Make sure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add lap to docker group
      ansible.builtin.user:
        name: lap
        groups: docker
        append: true

    - name: Install K3S
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Create runner folder
      ansible.builtin.file:
        path: /home/lap/actions-runner
        state: directory
        owner: lap
        group: lap

    - name: Download and extract runner
      ansible.builtin.unarchive:
        src: https://github.com/actions/runner/releases/download/v2.335.1/actions-runner-linux-x64-2.335.1.tar.gz
        dest: /home/lap/actions-runner
        remote_src: true
        owner: lap
        group: lap
        creates: /home/lap/actions-runner/config.sh

    - name: Configure runner
      become: false
      ansible.builtin.shell: ./config.sh --url https://github.com/Ahmedkhafagy6/flask-app --token YourToken --unattended
      args:
        chdir: /home/lap/actions-runner
        creates: /home/lap/actions-runner/.runner

    - name: Install runner service
      ansible.builtin.shell: ./svc.sh install lap && ./svc.sh start
      args:
        chdir: /home/lap/actions-runner
        creates: /etc/systemd/system/actions.runner.Ahmedkhafagy6-flask-app.lap.service
